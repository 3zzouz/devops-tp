- hosts: localhost
  gather_facts: false
  vars:
    docker_image: "{{ lookup('env', 'DOCKER_IMAGE') }}"
    build_number: "{{ lookup('env', 'BUILD_NUMBER') }}"
  tasks:
    - name: Substituer l'image dans le Deployment
      command: >
        sed -i "s|DOCKER_IMAGE_PLACEHOLDER|{{ docker_image }}:{{ build_number }}|g"
        ../k8s/deployment.yaml
    - name: Appliquer les manifests Kubernetes
      command: kubectl apply -f ../k8s/
      environment:
        KUBECONFIG: "{{ lookup('env', 'KUBECONFIG_PATH') }}"
    - name: Attendre que le Deployment soit prêt
      command: >
        kubectl rollout status deployment/devops-tp-app
        -n devops-tp --timeout=120s
